<div class="workspace">
  <mat-toolbar class="workspace__topbar" color="transparent">
    <div class="workspace__title-wrap">
      <mat-icon class="workspace__title-icon">account_tree</mat-icon>
      <div class="workspace__title">{{ diagramName }}</div>
    </div>

    <span class="workspace__topbar-spacer"></span>

    <div class="workspace__topbar-actions" role="toolbar" aria-label="편집 도구">
      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="undo()"
        [disabled]="!canUndo()"
        matTooltip="실행 취소 (Ctrl+Z)"
      >
        <mat-icon>undo</mat-icon>
        실행 취소
      </button>

      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="redo()"
        [disabled]="!canRedo()"
        matTooltip="다시 실행"
      >
        <mat-icon>redo</mat-icon>
        다시 실행
      </button>

      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="zoomToFit()"
        matTooltip="전체가 보이게 맞춤"
      >
        <mat-icon>fit_screen</mat-icon>
        맞춤
      </button>

      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="exportDiagram()"
        matTooltip="다이어그램을 JSON 파일로 저장"
      >
        <mat-icon>file_download</mat-icon>
        보내기
      </button>

      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="openImportFilePicker()"
        matTooltip="JSON 파일에서 다이어그램 불러오기"
      >
        <mat-icon>file_upload</mat-icon>
        가져오기
      </button>

      <input
        #importFileInput
        type="file"
        accept=".json,application/json"
        hidden
        (change)="onImportFileSelected($event)"
      />

      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="groupSelected()"
        matTooltip="선택 노드 그룹화 (Ctrl+G)"
      >
        <mat-icon>folder_open</mat-icon>
        그룹
      </button>

      <button
        mat-flat-button
        class="workspace__action-btn"
        type="button"
        (click)="ungroupSelected()"
        matTooltip="그룹 해제 (Ctrl+Shift+G)"
      >
        <mat-icon>folder_off</mat-icon>
        언그룹
      </button>

      <button
        mat-flat-button
        class="workspace__action-btn workspace__action-btn--danger"
        type="button"
        (click)="deleteSelected()"
        matTooltip="선택된 셀 삭제 (Del/Backspace)"
      >
        <mat-icon>delete_outline</mat-icon>
        삭제
      </button>
    </div>
  </mat-toolbar>

  <div class="workspace__io-message" *ngIf="ioMessage" role="status">
    {{ ioMessage }}
  </div>

  <div class="workspace__body">
    <div #stencilHost class="workspace__stencil" aria-label="Stencil 패널"></div>

    <div
      #graphHost
      class="workspace__canvas"
      role="application"
      aria-label="다이어그램 캔버스"
    ></div>
  </div>

  <div class="workspace__error" *ngIf="stencilError">
    {{ stencilError }}
  </div>
  <div #minimapHost class="workspace__minimap" aria-label="미니맵"></div>
</div>
