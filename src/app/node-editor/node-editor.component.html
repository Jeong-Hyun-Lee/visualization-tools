<div class="layout">
  <header class="layout__header">
    <div class="layout__title-wrap">
      <div class="layout__title">Substation Name</div>
    </div>
    <button mat-stroked-button type="button" class="layout__add-btn" (click)="addDiagram()">
      <mat-icon>add</mat-icon>
      새 다이어그램
    </button>
  </header>

  <div class="layout__tabs" role="tablist" aria-label="다이어그램 탭">
    <button
      type="button"
      class="layout__tab"
      *ngFor="let diagram of diagrams"
      [class.layout__tab--active]="diagram.id === activeDiagramId"
      (click)="selectDiagram(diagram.id)"
    >
      <span>{{ diagram.name }}</span>
      <mat-icon
        class="layout__tab-close"
        *ngIf="diagrams.length > 1"
        (click)="closeDiagram(diagram.id, $event)"
      >
        close
      </mat-icon>
    </button>
  </div>

  <div class="layout__content">
    <section class="layout__workspace">
      <app-diagram-workspace
        *ngFor="let diagram of diagrams"
        [diagramName]="diagram.name"
        [class.layout__workspace-item--hidden]="diagram.id !== activeDiagramId"
      ></app-diagram-workspace>
    </section>

    <aside class="layout__properties" aria-label="Properties">
      <div class="layout__properties-title">Properties</div>
    </aside>
  </div>
</div>
